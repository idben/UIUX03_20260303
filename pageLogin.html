<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入介面</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="block bg-secondary-subtle w-50 h-50 position-absolute
    top-50 start-50 translate-middle shadow rounded-4 border border-dark-subtle
  ">
    <h1 class="fw-bold text-center pt-4 pb-3">Login</h1>

    <div class="mb-1 px-3 hstack gap-2">
      <label for="exampleFormControlInput1" class="form-labe mb-0">Account</label>
      <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="請輸入帳號">
    </div>
    <div class="mb-3 px-3 hstack gap-2">
      <label for="exampleFormControlInput1" class="form-labe mb-0">Password</label>
      <input type="password" class="form-control" id="exampleFormControlInput1" placeholder="請輸入密碼">
    </div>
    <div class="d-grid gap-2 d-flex justify-content-end px-3">
      <button class="btn btn-primary me-md-2" type="button">送出</button>
      <button class="btn btn-danger" type="button">取消</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
